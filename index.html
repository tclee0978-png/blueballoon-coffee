        .hero-section {

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b">

            <h2 class="text-3xl font-bold text-[#1A2F4B] tracking-widest mb-16 text-center uppercase">Menu Selections</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <img src="./11-18-a4adr.jpg" class="w-full rounded shadow-lg">
                <img src="./12-19-de4hw.jpg" class="w-full rounded shadow-lg">
