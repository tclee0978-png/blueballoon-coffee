    <script src="https://cdn.tailwindcss.com"></script>

        body{
            font-family:'Noto Sans TC',sans-serif;
            background:#FDFCF8;
            overflow-x:hidden;
            scroll-behavior:smooth;
        }

        h1,h2,h3,h4{
            font-family:'Noto Serif TC',serif;
        }

        .text-gold{ color:#D4AF37; }
        .bg-paris-blue{ background:#1A2F4B; }

        .hero-section{
            background:
            linear-gradient(rgba(0,0,0,.48),rgba(0,0,0,.58)),
            url('./bf4276e48642744d5788bdad100cd45136c4f315.jpg');
            background-size:cover;
            background-position:center;
            min-height:100vh;
        }

        .btn-gold{
            background:#D4AF37;
            color:#1A2F4B;
            transition:.3s;
        }

        .btn-gold:hover{
            transform:translateY(-2px) scale(1.03);
            background:#e4c45a;
        }

        .btn-outline{
            border:1px solid rgba(255,255,255,.85);
            transition:.3s;
        }

        .btn-outline:hover{
            background:white;
            color:#1A2F4B;
        }

        .image-card{
            overflow:hidden;
            cursor:pointer;
        }

        .image-card img{
            transition:.7s ease;
        }

        .image-card:hover img{
            transform:scale(1.08);
        }

        .review-card{
            transition:.4s;
        }

        .review-card:hover{
            transform:translateY(-6px);
        }

        .lightbox{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.88);
            z-index:9999;
            justify-content:center;
            align-items:center;
            padding:24px;
        }

        .lightbox.active{
            display:flex;
        }

        .lightbox img{
            max-width:92%;
            max-height:86vh;
            border-radius:18px;
            box-shadow:0 30px 80px rgba(0,0,0,.7);
        }

        .lightbox-close{
            position:absolute;
            top:28px;
            right:36px;
            color:white;
            font-size:42px;
            cursor:pointer;
            font-weight:300;
        }

        .gallery-label{
            background:rgba(26,47,75,.92);
            color:white;
            letter-spacing:.18em;
        }

        .floating-text{
            display:inline-block;
            transition: transform .35s ease, text-shadow .35s ease, letter-spacing .35s ease;
        }

        .floating-text:hover{
            transform: translateY(-8px) scale(1.03);
            text-shadow: 0 12px 35px rgba(212,175,55,.35);
            letter-spacing: .22em;
        }

        .floating-text:active{
            transform: translateY(-2px) scale(.98);
        }
